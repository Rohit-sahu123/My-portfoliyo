<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814" />
      <stop offset="100%" stop-color="#0d1527" />
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Radial Glows -->
    <radialGradient id="cyan-glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="indigo-glow" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glass Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base Canvas -->
  <rect width="400" height="220" fill="url(#bg-grad)" />

  <!-- Ambient Light Orbs -->
  <circle cx="80" cy="50" r="120" fill="url(#cyan-glow)" />
  <circle cx="320" cy="170" r="130" fill="url(#indigo-glow)" />

  <!-- Background Cyber Grid System -->
  <path d="M 0,20 L 400,20 M 0,40 L 400,40 M 0,60 L 400,60 M 0,80 L 400,80 M 0,100 L 400,100 M 0,120 L 400,120 M 0,140 L 400,140 M 0,160 L 400,160 M 0,180 L 400,180 M 0,200 L 400,200" stroke="#1e293b" stroke-width="0.5" stroke-opacity="0.3" />
  <path d="M 40,0 L 40,220 M 80,0 L 80,220 M 120,0 L 120,220 M 160,0 L 160,220 M 200,0 L 200,220 M 240,0 L 240,220 M 280,0 L 280,220 M 320,0 L 320,220 M 360,0 L 360,220" stroke="#1e293b" stroke-width="0.5" stroke-opacity="0.3" />

  <!-- Premium Sidebar Nav Mockup -->
  <rect x="12" y="12" width="60" height="196" rx="8" fill="#090d1a" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)" />
  
  <!-- Sidebar Branding Dot -->
  <circle cx="42" cy="30" r="8" fill="url(#primary-grad)" />
  <circle cx="42" cy="30" r="4" fill="#ffffff" fill-opacity="0.3" />
  
  <!-- Sidebar Menu Lines -->
  <rect x="24" y="60" width="36" height="4" rx="2" fill="#14b8a6" fill-opacity="0.8" />
  <rect x="24" y="76" width="36" height="4" rx="2" fill="#334155" />
  <rect x="24" y="92" width="36" height="4" rx="2" fill="#334155" />
  <rect x="24" y="108" width="36" height="4" rx="2" fill="#334155" />
  <circle cx="42" cy="180" r="10" fill="#334155" fill-opacity="0.5" />

  <!-- Main visual panels -->
  <!-- Stats Cards Row -->
  <rect x="84" y="12" width="144" height="48" rx="8" fill="#0b1121" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06" filter="url(#shadow)" />
  <text x="96" y="28" font-family="'Space Grotesk', monospace" font-size="9" fill="#94a3b8" font-weight="600">ACTIVE REGISTRATIONS</text>
  <text x="96" y="44" font-family="'Space Grotesk', monospace" font-size="14" fill="#14b8a6" font-weight="700">1,248 Users</text>
  
  <rect x="240" y="12" width="148" height="48" rx="8" fill="#0b1121" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06" filter="url(#shadow)" />
  <text x="252" y="28" font-family="'Space Grotesk', monospace" font-size="9" fill="#94a3b8" font-weight="600">TOTAL CAMPUS EVENTS</text>
  <text x="252" y="44" font-family="'Space Grotesk', monospace" font-size="14" fill="#6366f1" font-weight="700">32 Events Live</text>

  <!-- Large Interactive Central Widget (Event Hub Console) -->
  <rect x="84" y="72" width="304" height="136" rx="8" fill="#0c1328" fill-opacity="0.8" stroke="#6366f1" stroke-opacity="0.2" filter="url(#shadow)" />
  <rect x="84" y="72" width="304" height="28" rx="8" fill="#080c1a" fill-opacity="0.8" />
  <text x="96" y="89" font-family="'Space Grotesk', monospace" font-size="9" fill="#f3f4f6" font-weight="700" letter-spacing="0.5">EVENT MANAGEMENT CONSOLE // ADMIN</text>
  
  <!-- Active Green Ping Dot -->
  <circle cx="370" cy="86" r="4" fill="#14b8a6" />
  <circle cx="370" cy="86" r="6" fill="none" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="1.5" />

  <!-- Dashboard Items list -->
  <g transform="translate(96, 112)">
    <!-- Event Row 1 -->
    <rect width="280" height="24" rx="4" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.04" />
    <circle cx="16" cy="12" r="5" fill="#6366f1" />
    <text x="32" y="15" font-family="'Outfit', sans-serif" font-size="8.5" fill="#f3f4f6" font-weight="500">Tech Saksham Hackathon</text>
    <text x="180" y="15" font-family="'Space Grotesk', monospace" font-size="7.5" fill="#14b8a6">APPROVED</text>
    <rect x="236" y="6" width="36" height="12" rx="3" fill="#1f2937" />
    <text x="244" y="14" font-family="'Outfit', sans-serif" font-size="7" fill="#9ca3af">Details</text>
  </g>

  <g transform="translate(96, 142)">
    <!-- Event Row 2 -->
    <rect width="280" height="24" rx="4" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.04" />
    <circle cx="16" cy="12" r="5" fill="#a855f7" />
    <text x="32" y="15" font-family="'Outfit', sans-serif" font-size="8.5" fill="#f3f4f6" font-weight="500">Inter-College Coding Arena</text>
    <text x="180" y="15" font-family="'Space Grotesk', monospace" font-size="7.5" fill="#14b8a6">APPROVED</text>
    <rect x="236" y="6" width="36" height="12" rx="3" fill="#1f2937" />
    <text x="244" y="14" font-family="'Outfit', sans-serif" font-size="7" fill="#9ca3af">Details</text>
  </g>

  <g transform="translate(96, 172)">
    <!-- Event Row 3 -->
    <rect width="280" height="24" rx="4" fill="#111827" fill-opacity="0.4" stroke="#ffffff" stroke-opacity="0.02" />
    <circle cx="16" cy="12" r="5" fill="#eab308" />
    <text x="32" y="15" font-family="'Outfit', sans-serif" font-size="8.5" fill="#9ca3af" font-weight="500">Annual Cultural Symphony</text>
    <text x="180" y="15" font-family="'Space Grotesk', monospace" font-size="7.5" fill="#f59e0b">PENDING</text>
    <rect x="236" y="6" width="36" height="12" rx="3" fill="#6366f1" fill-opacity="0.2" />
    <text x="242" y="14" font-family="'Outfit', sans-serif" font-size="7" fill="#a5b4fc">Approve</text>
  </g>
</svg>
