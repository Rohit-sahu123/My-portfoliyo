<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040612" />
      <stop offset="100%" stop-color="#0b0f24" />
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="yellow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <!-- Radial Glows -->
    <radialGradient id="purple-glow" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Canvas -->
  <rect width="400" height="220" fill="url(#bg-grad)" />
  <circle cx="80" cy="180" r="130" fill="url(#purple-glow)" />

  <!-- Grid mesh background -->
  <path d="M 0,25 L 400,25 M 0,55 L 400,55 M 0,85 L 400,85 M 0,115 L 400,115 M 0,145 L 400,145 M 0,175 L 400,175 M 0,205 L 400,205" stroke="#3b0764" stroke-width="0.5" stroke-opacity="0.15" />

  <!-- Website Landing Header Nav Mockup -->
  <rect x="16" y="12" width="368" height="28" rx="6" fill="#080a15" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.04" />
  <text x="28" y="30" font-family="'Space Grotesk', monospace" font-size="9" fill="#a855f7" font-weight="700">SCORE MORE ACADEMY</text>
  
  <!-- Header links mock -->
  <text x="210" y="28" font-family="'Outfit', sans-serif" font-size="7.5" fill="#f3f4f6">Home</text>
  <text x="246" y="28" font-family="'Outfit', sans-serif" font-size="7.5" fill="#9ca3af">Courses</text>
  <text x="288" y="28" font-family="'Outfit', sans-serif" font-size="7.5" fill="#9ca3af">Results</text>
  
  <rect x="330" y="19" width="44" height="14" rx="4" fill="url(#purple-grad)" />
  <text x="339" y="29" font-family="'Outfit', sans-serif" font-size="6.5" fill="#ffffff" font-weight="600">Inquire Now</text>

  <!-- Large Hero Promotional banner visual card -->
  <rect x="16" y="48" width="368" height="64" rx="8" fill="url(#purple-grad)" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.25" />
  
  <text x="32" y="74" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#ffffff" font-weight="700">Empowering Academic Excellence</text>
  <text x="32" y="90" font-family="'Outfit', sans-serif" font-size="8.5" fill="#c084fc">Premium coaching classes for mathematics, full-stack programming, and IT modules.</text>
  
  <!-- "Admission Open" glowing badge -->
  <rect x="294" y="60" width="76" height="18" rx="9" fill="url(#yellow-grad)" />
  <text x="304" y="72" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="7.5" fill="#000000">ADMISSIONS OPEN</text>

  <!-- Featured Course grid cards below -->
  <!-- Card 1: Math Advanced -->
  <g transform="translate(16, 122)">
    <rect width="176" height="84" rx="8" fill="#070a18" fill-opacity="0.9" stroke="#ffffff" stroke-opacity="0.04" />
    <rect width="176" height="6" rx="3" fill="url(#purple-grad)" />
    <text x="12" y="24" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#f3f4f6" font-weight="700">Pure Engineering Math</text>
    <text x="12" y="38" font-family="'Outfit', sans-serif" font-size="8" fill="#9ca3af">Calculus, algebra, and matrices logic.</text>
    
    <text x="12" y="68" font-family="'Space Grotesk', monospace" font-size="9" fill="#14b8a6" font-weight="600">Active Slots</text>
    <text x="136" y="68" font-family="'Outfit', sans-serif" font-size="8" fill="#a855f7" font-weight="500">B.Tech Batch</text>
  </g>

  <!-- Card 2: Java Coding -->
  <g transform="translate(208, 122)">
    <rect width="176" height="84" rx="8" fill="#070a18" fill-opacity="0.9" stroke="#ffffff" stroke-opacity="0.04" />
    <rect width="176" height="6" rx="3" fill="#14b8a6" />
    <text x="12" y="24" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#f3f4f6" font-weight="700">Java Full-Stack Web App</text>
    <text x="12" y="38" font-family="'Outfit', sans-serif" font-size="8" fill="#9ca3af">Core Java, OOPs, APIs, and databases.</text>
    
    <text x="12" y="68" font-family="'Space Grotesk', monospace" font-size="9" fill="#14b8a6" font-weight="600">Active Slots</text>
    <text x="144" y="68" font-family="'Outfit', sans-serif" font-size="8" fill="#a855f7" font-weight="500">IT Batch</text>
  </g>
</svg>
